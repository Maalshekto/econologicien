<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ if .IsHome }}{{ .Site.Title }} - Blog de finances personnelles{{ else }}{{ .Title }} - {{ .Site.Title }}{{ end }}</title>
    <link rel="stylesheet" href="{{ "styles.css" | relURL }}" />
  </head>
  <body>
    <header class="container">
      <h1><a href="{{ relURL "" }}" style="color:inherit;text-decoration:none;">{{ .Site.Title }}</a></h1>
      <p>Des conseils simples pour mieux gérer vos finances personnelles.</p>
    </header>
    <main class="container">
      {{ block "main" . }}{{ end }}
    </main>
  </body>
</html>
